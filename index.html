<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>SU Snacks - Pedido</title>
<style>
:root {
  --bg:#f3efe7;
  --card:#ffffff;
  --ink:#121212;
  --muted:#6e6a63;
  --gold:#3e3400;
  --soft:#e3d9c8;
  --shadow:0 10px 28px rgba(32,25,12,.10);
  --radius:22px;
}
* { box-sizing:border-box; }
body {
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  color:var(--ink);
  background:radial-gradient(circle at top, #fbf8f1 0%, var(--bg) 55%, #eee8dc 100%);
  min-height:100vh;
}
header {
  text-align:center;
  padding:18px 18px 10px;
}
.logo-su {
  width:300px;
  max-width:78vw;
  height:auto;
  display:block;
  margin:0 auto;
}
.brand {
  margin-top:12px;
  letter-spacing:10px;
  font-size:15px;
  color:#0f0f0f;
}
.tagline {
  margin-top:18px;
  letter-spacing:9px;
  font-size:15px;
  color:#0f0f0f;
}
.app {
  width:min(1240px, 96vw);
  margin:8px auto 36px;
  display:grid;
  grid-template-columns: 1fr 390px;
  gap:22px;
  align-items:start;
}
.products {
  display:grid;
  grid-template-columns: repeat(3, minmax(210px, 1fr));
  gap:18px;
}
.card {
  background:var(--card);
  border:1px solid #e8ddca;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
  min-height:305px;
  display:flex;
  flex-direction:column;
}
.photo-wrap {
  height:150px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:12px 14px 4px;
  background:linear-gradient(180deg,#fff,#fbfaf7);
}
.photo-wrap img {
  max-width:100%;
  max-height:142px;
  object-fit:contain;
  display:block;
}
.placeholder {
  height:118px;
  width:118px;
  border-radius:24px;
  background:linear-gradient(135deg,#f8d36d,#f1782f);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-weight:800;
  letter-spacing:1px;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.35);
}
.info { padding:12px 16px 16px; display:flex; flex-direction:column; flex:1; }
.category {
  color:var(--muted);
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:5px;
}
.name {
  font-size:20px;
  font-weight:800;
  line-height:1.1;
  min-height:44px;
}
.price {
  margin-top:8px;
  font-size:19px;
  font-weight:800;
}
.controls {
  margin-top:auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding-top:14px;
}
.btn {
  width:54px;
  height:54px;
  border:none;
  border-radius:14px;
  background:#111;
  color:white;
  font-size:28px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 5px 10px rgba(0,0,0,.15);
}
.btn:active { transform:scale(.96); }
.qty { font-size:22px; font-weight:800; min-width:34px; text-align:center; }
.order {
  background:#fff;
  border-radius:28px;
  box-shadow:var(--shadow);
  padding:26px 24px;
  position:sticky;
  top:18px;
  min-height:430px;
}
.order h2 { margin:0 0 20px; font-size:31px; }
.empty { color:var(--muted); font-size:16px; margin-bottom:18px; }
.order-list { margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:10px; }
.order-item {
  display:grid;
  grid-template-columns: 1fr auto;
  gap:12px;
  border-bottom:1px solid #eee7da;
  padding-bottom:9px;
  font-size:15px;
}
.order-item strong { font-size:16px; }
.total-row {
  margin-top:22px;
  padding-top:18px;
  border-top:2px solid #efe7d9;
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-size:31px;
  font-weight:900;
  color:var(--gold);
}
.instructions {
  margin-top:22px;
  background:#f1ece2;
  border-radius:16px;
  padding:16px 15px;
  font-size:18px;
}
.instructions b { display:block; margin-bottom:4px; }
.clear {
  margin-top:18px;
  width:100%;
  border:none;
  background:#ded4c1;
  border-radius:14px;
  padding:15px;
  font-weight:800;
  cursor:pointer;
}
.final {
  margin-top:14px;
  width:100%;
  border:none;
  background:#111;
  color:white;
  border-radius:16px;
  padding:18px;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
}
.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:10;
}
.modal-card {
  width:min(520px, 94vw);
  background:#fff;
  border-radius:30px;
  padding:38px 32px;
  text-align:center;
  box-shadow:0 30px 80px rgba(0,0,0,.35);
}
.modal-card h2 { font-size:34px; margin:0 0 16px; }
.big-total { font-size:58px; color:var(--gold); font-weight:900; margin:12px 0 20px; }
.modal-card p { font-size:22px; line-height:1.35; margin:0 0 22px; }
.close { background:#111; color:white; border:none; border-radius:16px; padding:16px 28px; font-size:18px; font-weight:800; cursor:pointer; }
@media (max-width: 980px) {
  .app { grid-template-columns:1fr; }
  .order { position:relative; top:0; }
}
@media (max-width: 760px) {
  .products { grid-template-columns:repeat(2, minmax(160px,1fr)); gap:14px; }
  .brand,.tagline { letter-spacing:5px; font-size:12px; }
  .logo-su { width:230px; }
  .card { min-height:285px; }
  .photo-wrap { height:130px; }
  .photo-wrap img { max-height:122px; }
  .name { font-size:17px; }
  .price { font-size:17px; }
  .btn { width:48px; height:48px; }
}
</style>
</head>

const quantities = Array(products.length).fill(0);
function brl(v) { return v.toLocaleString('pt-BR', {style:'currency', currency:'BRL'}); }
function renderProducts() {
  const el = document.getElementById('products');
  el.innerHTML = products.map((p,i) => `
    <article class="card">
      <div class="photo-wrap">${p.img ? `<img src="${p.img}" alt="${p.name}">` : `<div class="placeholder">SUCO<br>LATA</div>`}</div>
      <div class="info">
        <div class="category">${p.category}</div>
        <div class="name">${p.name}</div>
        <div class="price">${brl(p.price)}</div>
        <div class="controls">
          <button class="btn" onclick="alterar(${i}, -1)">−</button>
          <span class="qty" id="qty-${i}">0</span>
          <button class="btn" onclick="alterar(${i}, 1)">+</button>
        </div>
      </div>
    </article>
  `).join('');
}
function alterar(i, delta) {
  quantities[i] = Math.max(0, quantities[i] + delta);
  document.getElementById(`qty-${i}`).textContent = quantities[i];
  renderOrder();
}
function renderOrder() {
  const list = document.getElementById('orderList');
  const empty = document.getElementById('empty');
  let total = 0;
  const items = products.map((p,i) => {
    const q = quantities[i];
    if(!q) return '';
    const subtotal = q * p.price;
    total += subtotal;
    return `<li class="order-item"><span><strong>${q}x</strong> ${p.name}</span><strong>${brl(subtotal)}</strong></li>`;
  }).join('');
  list.innerHTML = items;
  empty.style.display = items ? 'none' : 'block';
  document.getElementById('total').textContent = brl(total);
  document.getElementById('modalTotal').textContent = brl(total);
}
function limpar() {
  quantities.fill(0);
  quantities.forEach((_,i)=>{ const q = document.getElementById(`qty-${i}`); if(q) q.textContent = '0'; });
  renderOrder();
}
function finalizar() {
  const itensSelecionados = products
    .map((p, i) => ({ ...p, quantidade: quantities[i] }))
    .filter(item => item.quantidade > 0);

  if (!itensSelecionados.length) {
    alert('Selecione pelo menos um produto antes de finalizar.');
    return;
  }

  const agora = new Date();
  const doisDigitos = numero => String(numero).padStart(2, '0');
  const numeroPedido = [
    agora.getFullYear(),
    doisDigitos(agora.getMonth() + 1),
    doisDigitos(agora.getDate()),
    '-',
    doisDigitos(agora.getHours()),
    doisDigitos(agora.getMinutes()),
    doisDigitos(agora.getSeconds())
  ].join('');

  const data = agora.toLocaleDateString('pt-BR');
  const hora = agora.toLocaleTimeString('pt-BR', {
    hour: '2-digit',
    minute: '2-digit'
  });

  const total = itensSelecionados.reduce(
    (soma, item) => soma + item.quantidade * item.price,
    0
  );

  const linhasItens = itensSelecionados.map(item => {
    const subtotal = item.quantidade * item.price;
    return `${item.quantidade}x ${item.name} — ${brl(subtotal)}`;
  });

  const mensagem = [
    '*Novo pedido — SU Snacks*',
    `*Pedido:* #${numeroPedido}`,
    `*Data:* ${data}`,
    `*Hora:* ${hora}`,
    '',
    '*Itens:*',
    ...linhasItens,
    '',
    `*Total:* ${brl(total)}`
  ].join('\n');

  const telefone = '5512991833673';
  const urlWhatsApp = `https://wa.me/${telefone}?text=${encodeURIComponent(mensagem)}`;

  window.open(urlWhatsApp, '_blank', 'noopener,noreferrer');
}
function fecharModal() { document.getElementById('modal').style.display = 'none'; }
renderProducts();
renderOrder();
</script>
